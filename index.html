<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — Super App</title>
  <link rel="stylesheet" href="core/style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 1rem;
    }
    .login-card {
      background: var(--card);
      padding: 2.5rem 2.25rem;
      border-radius: 1.25rem;
      box-shadow: var(--shadow);
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: .5rem;
    }
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.02em;
    }
    .logo p {
      font-size: .875rem;
      color: var(--muted);
      margin-top: .25rem;
    }
    .footer-note {
      text-align: center;
      font-size: .75rem;
      color: var(--muted);
      margin-top: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h1>Super App</h1>
        <p>ระบบงานส่วนตัว</p>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="username">ชื่อผู้ใช้</label>
          <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" required autofocus>
        </div>
        <div class="field">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required>
        </div>
        <div id="errMsg" class="alert-error hidden">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
        <button type="submit" id="submitBtn" class="btn-primary full">เข้าสู่ระบบ</button>
      </form>
    </div>
    <p class="footer-note">Super App v1.0</p>
  </div>

  <script src="core/config.js"></script>
  <script src="core/auth.js"></script>
  <script>
    if (getSession()) window.location.href = 'dashboard.html';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errMsg');
      err.classList.add('hidden');
      btn.textContent = 'กำลังตรวจสอบ...';
      btn.disabled = true;

      const ok = await login(
        document.getElementById('username').value.trim(),
        document.getElementById('password').value
      );

      if (ok) {
        window.location.href = 'dashboard.html';
      } else {
        err.classList.remove('hidden');
        btn.textContent = 'เข้าสู่ระบบ';
        btn.disabled = false;
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    });
  </script>
</body>
</html>
